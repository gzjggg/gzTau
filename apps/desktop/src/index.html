<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tau</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div class="brand">
          <span class="mark">τ</span>
          <div>
            <h1>Tau</h1>
            <p class="sub">Pi 会话桌面壳</p>
          </div>
        </div>
        <button type="button" id="refresh-btn" class="btn ghost">刷新</button>
      </header>

      <section id="status" class="status">正在查找本机 Tau 实例…</section>

      <section id="list" class="list" hidden></section>

      <section id="empty" class="empty" hidden>
        <h2>没有运行中的 Pi / Tau</h2>
        <p>请在终端启动 Pi（已安装本产品仓的 Tau 扩展）。启动后点「刷新」，或重新打开本应用。</p>
        <pre class="cmd">pi</pre>
        <p class="hint">桌面壳只连接 <code>127.0.0.1</code>，不会自动创建隐藏的 Pi 进程。</p>
      </section>

      <footer class="footer">
        <span>关窗不会退出 Pi</span>
        <span id="build">D1 loopback</span>
      </footer>
    </main>
    <script type="module" src="main.js"></script>
  </body>
</html>
